<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yalla Lebanon</title>
  <link rel="icon" href="%PUBLIC_URL%/images/favicon.ico" type="image/x-icon" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous">

  <!-- Custom CSS -->
  <link href="%PUBLIC_URL%/css/style.css" rel="stylesheet">
  <link href="%PUBLIC_URL%/css/superfish.css" rel="stylesheet">
  <link href="%PUBLIC_URL%/css/owl.carousel.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    crossorigin="anonymous" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Bootstrap Bundle (with Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

  <!-- jQuery (only if absolutely needed) -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <!-- Plugins -->
  <script src="%PUBLIC_URL%/js/owl.carousel.js"></script>
  <!-- <script src="%PUBLIC_URL%/js/superfish.js"></script> -->

  <!-- Owl Carousel init -->
  <script type="text/javascript">
    $(document).ready(function () {
      $("#legal-history").owlCarousel({
        loop: true,
        autoplay: true,
        margin: 20,
        autoplayTimeout: 3000,
        responsiveClass: true,
        responsive: {
          0: { items: 1, nav: true },
          550: { items: 1, nav: true },
          768: { items: 1, nav: true, loop: true }
        }
      });

      // Superfish menu
      // $('ul.sf-menu').superfish();
      $('#nav-wrap').prepend('<div id="menu-icon"></div>');
      $("#menu-icon").on("click", function () {
        $(".sf-menu").slideToggle();
        $(this).toggleClass("active");
      });

      // Sticky Navbar
      $(window).scroll(function () {
        if ($(window).scrollTop() > 63) {
          $('.sticky-top').addClass('navbar-fixed');
        } else {
          $('.sticky-top').removeClass('navbar-fixed');
        }
      });

      // Mobile submenu
      $("ul.mobile-menu li").each(function () {
        if ($(this).hasClass('menu-item-has-children')) {
          $(this).append('<span class="submenu-toggle"></span>');
        }
      });

      $(document).on("click", ".submenu-toggle", function () {
        const li = $(this).closest("li");
        li.find(".sub-menu:eq(0)").toggle();
        $(this).toggleClass('menu-open');
      });

      // Overlay menu open/close
      $(".menu-icon").click(function () {
        $(".overlay").addClass('open-mobile-menu');
      });

      $(".closebtn").click(function () {
        $(".overlay").removeClass('open-mobile-menu');
      });
    });
  </script>
</body>

</html>
